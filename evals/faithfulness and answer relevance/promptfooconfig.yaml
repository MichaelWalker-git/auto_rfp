description: "Context Faithfulness Evaluation — RAG Answer Grounding"

prompts:
  - "{{ query }}"

providers:
  - id: file://generate-develop.mjs
    label: "base_prompt"
  - id: file://generate-production.mjs
    label: "eval_v2"
  - id: file://generate.mjs
    label: "eval_v3"
  - id: file://generate-v4.mjs
    label: "eval_v4"

defaultTest:
  options:
    provider:
      text: "bedrock:us.anthropic.claude-sonnet-4-6"
      embedding: "bedrock:embedding:amazon.titan-embed-text-v2:0"
  assert:
    - type: llm-rubric
      value: |
        Score whether this answer is APPROPRIATE for the query, given that the system
        is designed to only answer from provided context:
        - 1.0: Answer addresses the query using grounded facts, OR correctly states
          that context is insufficient (partial or full refusal is acceptable)
        - 0.5: Answer partially addresses the query but includes some off-topic content
        - 0.0: Answer is completely off-topic, incoherent, or ignores the query entirely
      threshold: 0.7
  # Provider returns "answer\n---CONTEXT_SEPARATOR---\ncontext"
  # transform extracts only the answer; contextTransform extracts the context
  transform: "output.includes('---CONTEXT_SEPARATOR---') ? output.split('---CONTEXT_SEPARATOR---')[0].trim() : output"

outputPath: ./results/latest.json

tests:
  # =========================================================================
  # TECHNICAL APPROACH
  # =========================================================================

  - vars:
      query: "Describe your proposed technical approach to meeting the requirements outlined in the solicitation."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.9
      - type: llm-rubric
        value: "The answer should be a coherent, proposal-quality response that addresses the technical approach question. It should not contain phrases like 'I don't know' or 'the context does not contain'. Score 1.0 if fully formed, 0.5 if partially formed, 0.0 if empty or a refusal."
        threshold: 0.7

  - vars:
      query: "How will your solution ensure 99.9% system uptime during the period of performance?"
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.9
      - type: llm-rubric
        value: "The answer should specifically address uptime, availability, or reliability. Every claim about SLAs, monitoring tools, or failover mechanisms must be traceable to the context. Score 1.0 if all claims grounded, 0.5 if some fabricated, 0.0 if mostly fabricated."
        threshold: 0.7

  - vars:
      query: "What tools and technologies will you use to deliver the data migration services?"
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.9
      - type: llm-rubric
        value: "The answer should list specific migration tools and methodologies. All named tools and services must appear in the context. Score 1.0 if all tools are grounded, 0.5 if some are fabricated, 0.0 if mostly fabricated."
        threshold: 0.7

  - vars:
      query: "Describe how your solution will integrate with the agency's existing infrastructure and legacy systems."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.9

  # =========================================================================
  # MANAGEMENT
  # =========================================================================

  - vars:
      query: "Describe your project management methodology and how you will ensure on-time delivery of all milestones."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.9
      - type: llm-rubric
        value: "The answer should describe a project management methodology. All named roles, tools, and processes must be grounded in the context. Score 1.0 if fully grounded, 0.5 if partially fabricated, 0.0 if mostly fabricated."
        threshold: 0.7

  - vars:
      query: "Provide an organizational chart showing key personnel and their roles on this contract."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.9
      - type: llm-rubric
        value: "The answer should list specific roles and personnel. All named individuals and their titles must appear in the context. Penalize if the answer invents personnel names or roles not found in the context. Score 1.0 if all personnel grounded, 0.0 if names are fabricated."
        threshold: 0.8

  - vars:
      query: "How will you handle knowledge transfer during the transition-in period?"
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.9

  - vars:
      query: "Describe your approach to risk identification and mitigation throughout the contract lifecycle."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.9

  # =========================================================================
  # PAST PERFORMANCE
  # =========================================================================

  - vars:
      query: "Provide three examples of contracts of similar size and scope performed within the last five years."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.85
      - type: llm-rubric
        value: "All client names, contract values, and project descriptions must match the context exactly. The answer must not fabricate client names, dollar amounts, or project outcomes. Score 1.0 if all facts match context, 0.0 if any client name or dollar amount is fabricated."
        threshold: 0.9

  - vars:
      query: "Describe a situation where your team encountered a significant technical challenge on a similar engagement and how you resolved it."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.9
      - type: llm-rubric
        value: "The answer must describe a specific, real challenge from the context. Client names, metrics, and outcomes must match. Penalize heavily for fabricated project details. Score 1.0 if fully grounded, 0.0 if the scenario is invented."
        threshold: 0.8

  - vars:
      query: "What is your experience supporting federal civilian agencies with cloud migration projects?"
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.9

  # =========================================================================
  # PRICING
  # =========================================================================

  - vars:
      query: "Describe your pricing methodology and how your proposed costs represent best value to the Government."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.9
      - type: llm-rubric
        value: "All dollar amounts, rate figures, and labor categories must match the context. The answer must not invent hourly rates or cost figures. Score 1.0 if all numbers match context, 0.0 if any dollar amount is fabricated."
        threshold: 0.9

  - vars:
      query: "Provide your proposed labor categories and fully burdened hourly rates."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.95
      - type: llm-rubric
        value: "Every labor category name, hourly rate, and experience requirement must exactly match the context. This is a factual accuracy test — zero tolerance for fabricated rates. Score 1.0 if exact match, 0.0 if any rate is invented."
        threshold: 0.95

  # =========================================================================
  # SECURITY
  # =========================================================================

  - vars:
      query: "Describe how your team will comply with security requirements and maintain secure operations throughout the period of performance."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.9

  - vars:
      query: "How will your organization handle sensitive data and ensure compliance with federal security standards?"
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.9

  - vars:
      query: "Confirm that all proposed key personnel hold the required qualifications and certifications."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.9
      - type: llm-rubric
        value: "All certification names and personnel qualifications must match the context. The answer must not fabricate certification names or attribute certifications to people not mentioned. Score 1.0 if all credentials match context, 0.0 if any are fabricated."
        threshold: 0.9

  # =========================================================================
  # QUALIFICATIONS
  # =========================================================================

  - vars:
      query: "What certifications does your organization currently hold?"
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.9
      - type: llm-rubric
        value: "Every certification, partner status, and competency designation named must appear in the context. Score 1.0 if all match, 0.0 if any certification is fabricated."
        threshold: 0.9

  - vars:
      query: "Describe your team's experience with cloud environments and AWS services."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.9

  # =========================================================================
  # CASE STUDIES
  # =========================================================================

  - vars:
      query: "Describe a past project involving document processing and compliance verification."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.9
      - type: llm-rubric
        value: "The case study details — client name, technical approach, metrics, and outcomes — must all come from the context. Score 1.0 if fully grounded, 0.0 if the case study is fabricated."
        threshold: 0.8

  - vars:
      query: "Describe your experience modernizing loan processing or financial services platforms."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.9

  - vars:
      query: "Describe your experience building automated document classification and routing systems."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.9

  # =========================================================================
  # KEY PERSONNEL
  # =========================================================================

  - vars:
      query: "Describe the qualifications of your key personnel responsible for infrastructure, deployment, and system reliability."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.9
      - type: llm-rubric
        value: "All personnel names, job titles, tools expertise, and project history must match the context. The answer must not invent people or attribute skills not mentioned. Score 1.0 if all personnel details are grounded, 0.0 if any person or qualification is fabricated."
        threshold: 0.9

  - vars:
      query: "Describe the qualifications of your key personnel responsible for backend development and cloud-native application architecture."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.9

  - vars:
      query: "Identify key personnel who hold current AWS certifications and describe their relevant project experience."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.9
      - type: llm-rubric
        value: "Every named individual, their certifications, and project experience must be traceable to the context. Zero tolerance for fabricated personnel. Score 1.0 if exact match, 0.0 if any person is invented."
        threshold: 0.95

  # =========================================================================
  # CROSS-CUTTING
  # =========================================================================

  - vars:
      query: "Provide a company overview including legal name and leadership."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.9
      - type: llm-rubric
        value: "The company name, CEO name, location, and business description must exactly match the context. Score 1.0 if all facts match, 0.0 if any company detail is fabricated."
        threshold: 0.9

  - vars:
      query: "Describe your artificial intelligence and machine learning capabilities."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.9

  - vars:
      query: "Describe your approach to post-deployment support and ongoing managed services."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.9

  - vars:
      query: "Describe your DevOps practices and continuous integration/deployment approach."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.9

  - vars:
      query: "Provide references with contact information for past engagements."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.95
      - type: llm-rubric
        value: "All reference names, organizations, contact details, and project names must exactly match the context. This is a factual accuracy test — the answer must not fabricate any contact information. Score 1.0 if all references match context, 0.0 if any contact is fabricated."
        threshold: 0.95
