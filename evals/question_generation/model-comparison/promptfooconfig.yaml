description: "Model Comparison — Haiku 3 vs Sonnet 4 vs Sonnet 4.6 vs Opus 4.6 (v5 production prompt with citations)"

prompts:
  - "{{ query }}"

providers:
  # Haiku 3 removed — ignores anti-hallucination guardrails, not useful for comparison
  # - id: file://generate-model.mjs
  #   label: "haiku_3"
  #   config:
  #     modelId: "anthropic.claude-3-haiku-20240307-v1:0"
  - id: file://generate-model.mjs
    label: "sonnet_4"
    config:
      modelId: "us.anthropic.claude-sonnet-4-20250514-v1:0"
  - id: file://generate-model.mjs
    label: "sonnet_4_6"
    config:
      modelId: "us.anthropic.claude-sonnet-4-6"
  - id: file://generate-model.mjs
    label: "opus_4_6"
    config:
      modelId: "us.anthropic.claude-opus-4-6-v1"

defaultTest:
  options:
    provider:
      text: "bedrock:us.anthropic.claude-sonnet-4-6"
      embedding: "bedrock:embedding:amazon.titan-embed-text-v2:0"
  assert:
    - type: answer-relevance
      threshold: 0.15
  # Provider returns "answer\n---CONTEXT_SEPARATOR---\ncontext"
  # transform extracts only the answer portion.
  # When answer is empty (correct refusal), we insert a placeholder so graders get text.
  transform: "output.includes('---CONTEXT_SEPARATOR---') ? (output.split('---CONTEXT_SEPARATOR---')[0].trim() || 'NO_ANSWER: Model correctly declined due to insufficient context.') : output"

outputPath: ./results/latest.json

tests:
  # =========================================================================
  # TECHNICAL APPROACH
  # =========================================================================

  - vars:
      query: "Describe your proposed technical approach to meeting the requirements outlined in the solicitation."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.7
      - type: llm-rubric
        value: |
          Evaluate the answer for faithfulness and quality. The model receives RAG context that may or may not be relevant.
          CORRECT REFUSAL: If the answer explicitly states it cannot answer due to insufficient context, or is a refusal placeholder like '[NO_ANSWER...]', score 0.7 — this is acceptable behavior showing the model avoids hallucination.
          GOOD ANSWER: If the answer is a coherent, proposal-quality response grounded in the provided context, score 0.9-1.0.
          PARTIAL: If partially formed but grounded, score 0.5-0.8.
          BAD: If it fabricates claims not in context, score 0.0-0.3.
        threshold: 0.5

  - vars:
      query: "How will your solution ensure 99.9% system uptime during the period of performance?"
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.7
      - type: llm-rubric
        value: |
          The answer should specifically address uptime, availability, or reliability. Every claim about SLAs, monitoring tools, or failover mechanisms must be traceable to the context.
          CORRECT REFUSAL: If the answer explicitly declines because context lacks uptime/reliability data, score 0.7.
          Score 1.0 if all claims grounded, 0.5 if some fabricated, 0.0 if mostly fabricated.
        threshold: 0.5

  - vars:
      query: "What tools and technologies will you use to deliver the data migration services?"
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.7
      - type: llm-rubric
        value: |
          The answer should list specific migration tools and methodologies. All named tools and services must appear in the context.
          CORRECT REFUSAL: If the answer declines because context lacks migration-specific data, score 0.7.
          Score 1.0 if all tools are grounded, 0.5 if some are fabricated, 0.0 if mostly fabricated.
        threshold: 0.5

  - vars:
      query: "Describe how your solution will integrate with the agency's existing infrastructure and legacy systems."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.7

  # =========================================================================
  # MANAGEMENT
  # =========================================================================

  - vars:
      query: "Describe your project management methodology and how you will ensure on-time delivery of all milestones."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.7
      - type: llm-rubric
        value: |
          The answer should describe a project management methodology. All named roles, tools, and processes must be grounded in the context.
          CORRECT REFUSAL: If the answer declines because context lacks PM methodology data, score 0.7.
          Score 1.0 if fully grounded, 0.5 if partially fabricated, 0.0 if mostly fabricated.
        threshold: 0.5

  - vars:
      query: "Provide an organizational chart showing key personnel and their roles on this contract."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.7
      - type: llm-rubric
        value: |
          The answer should list specific roles and personnel. All named individuals and their titles must appear in the context. Penalize if the answer invents personnel names or roles not found in the context.
          CORRECT REFUSAL: If the answer declines because context lacks personnel data, score 0.7.
          Score 1.0 if all personnel grounded, 0.0 if names are fabricated.
        threshold: 0.5

  - vars:
      query: "How will you handle knowledge transfer during the transition-in period?"
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.7

  - vars:
      query: "Describe your approach to risk identification and mitigation throughout the contract lifecycle."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.7

  # =========================================================================
  # PAST PERFORMANCE
  # =========================================================================

  - vars:
      query: "Provide three examples of contracts of similar size and scope performed within the last five years."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.7
      - type: llm-rubric
        value: |
          All client names, contract values, and project descriptions must match the context exactly. The answer must not fabricate client names, dollar amounts, or project outcomes.
          CORRECT REFUSAL: If the answer declines because context lacks past performance data of similar size/scope, score 0.7.
          Score 1.0 if all facts match context, 0.0 if any client name or dollar amount is fabricated.
        threshold: 0.7

  - vars:
      query: "Describe a situation where your team encountered a significant technical challenge on a similar engagement and how you resolved it."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.7
      - type: llm-rubric
        value: |
          The answer must describe a specific, real challenge from the context. Client names, metrics, and outcomes must match.
          CORRECT REFUSAL: If the answer declines because context lacks challenge/resolution narratives, score 0.7.
          Penalize heavily for fabricated project details. Score 1.0 if fully grounded, 0.0 if the scenario is invented.
        threshold: 0.5

  - vars:
      query: "What is your experience supporting federal civilian agencies with cloud migration projects?"
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.7

  # =========================================================================
  # PRICING
  # =========================================================================

  - vars:
      query: "Describe your pricing methodology and how your proposed costs represent best value to the Government."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.7
      - type: llm-rubric
        value: |
          All dollar amounts, rate figures, and labor categories must match the context. The answer must not invent hourly rates or cost figures.
          CORRECT REFUSAL: If the answer declines because context lacks pricing data, score 0.8 — correctly refusing to fabricate prices is critical.
          Score 1.0 if all numbers match context, 0.0 if any dollar amount is fabricated.
        threshold: 0.7

  - vars:
      query: "Provide your proposed labor categories and fully burdened hourly rates."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.8
      - type: llm-rubric
        value: |
          Every labor category name, hourly rate, and experience requirement must exactly match the context. This is a factual accuracy test — zero tolerance for fabricated rates.
          CORRECT REFUSAL: If the answer declines because context lacks labor rate data, score 0.9 — correctly refusing to fabricate rates is the best behavior.
          Score 1.0 if exact match, 0.0 if any rate is invented.
        threshold: 0.7

  # =========================================================================
  # SECURITY
  # =========================================================================

  - vars:
      query: "Describe how your team will comply with security requirements and maintain secure operations throughout the period of performance."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.7

  - vars:
      query: "How will your organization handle sensitive data and ensure compliance with federal security standards?"
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.7

  - vars:
      query: "Confirm that all proposed key personnel hold the required qualifications and certifications."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.7
      - type: llm-rubric
        value: |
          All certification names and personnel qualifications must match the context. The answer must not fabricate certification names or attribute certifications to people not mentioned.
          CORRECT REFUSAL: If the answer declines because context lacks personnel qualification data, score 0.8.
          Score 1.0 if all credentials match context, 0.0 if any are fabricated.
        threshold: 0.5

  # =========================================================================
  # QUALIFICATIONS
  # =========================================================================

  - vars:
      query: "What certifications does your organization currently hold?"
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.7
      - type: llm-rubric
        value: |
          Every certification, partner status, and competency designation named must appear in the context.
          CORRECT REFUSAL: If the answer declines because context lacks certification data, score 0.8.
          Score 1.0 if all match, 0.0 if any certification is fabricated.
        threshold: 0.5

  - vars:
      query: "Describe your team's experience with cloud environments and AWS services."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.7

  # =========================================================================
  # CASE STUDIES
  # =========================================================================

  - vars:
      query: "Describe a past project involving document processing and compliance verification."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.7
      - type: llm-rubric
        value: |
          The case study details — client name, technical approach, metrics, and outcomes — must all come from the context.
          CORRECT REFUSAL: If the answer declines because context lacks document processing/compliance data, score 0.7.
          Score 1.0 if fully grounded, 0.0 if the case study is fabricated.
        threshold: 0.5

  - vars:
      query: "Describe your experience modernizing loan processing or financial services platforms."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.7

  - vars:
      query: "Describe your experience building automated document classification and routing systems."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.7

  # =========================================================================
  # KEY PERSONNEL
  # =========================================================================

  - vars:
      query: "Describe the qualifications of your key personnel responsible for infrastructure, deployment, and system reliability."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.7
      - type: llm-rubric
        value: |
          All personnel names, job titles, tools expertise, and project history must match the context. The answer must not invent people or attribute skills not mentioned.
          CORRECT REFUSAL: If the answer declines because context lacks personnel qualification data, score 0.7.
          Score 1.0 if all personnel details are grounded, 0.0 if any person or qualification is fabricated.
        threshold: 0.5

  - vars:
      query: "Describe the qualifications of your key personnel responsible for backend development and cloud-native application architecture."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.7

  - vars:
      query: "Identify key personnel who hold current AWS certifications and describe their relevant project experience."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.7
      - type: llm-rubric
        value: |
          Every named individual, their certifications, and project experience must be traceable to the context. Zero tolerance for fabricated personnel.
          CORRECT REFUSAL: If the answer declines because context lacks AWS certification data, score 0.8.
          Score 1.0 if exact match, 0.0 if any person is invented.
        threshold: 0.5

  # =========================================================================
  # CROSS-CUTTING
  # =========================================================================

  - vars:
      query: "Provide a company overview including legal name and leadership."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.7
      - type: llm-rubric
        value: |
          The company name, CEO name, location, and business description must exactly match the context.
          CORRECT REFUSAL: If the answer declines because context lacks company overview data, score 0.7.
          Score 1.0 if all facts match, 0.0 if any company detail is fabricated.
        threshold: 0.5

  - vars:
      query: "Describe your artificial intelligence and machine learning capabilities."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.7

  - vars:
      query: "Describe your approach to post-deployment support and ongoing managed services."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.7

  - vars:
      query: "Describe your DevOps practices and continuous integration/deployment approach."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.7

  - vars:
      query: "Provide references with contact information for past engagements."
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.8
      - type: llm-rubric
        value: |
          All reference names, organizations, contact details, and project names must exactly match the context. This is a factual accuracy test — the answer must not fabricate any contact information.
          CORRECT REFUSAL: If the answer declines because context lacks reference/contact data, score 0.9 — correctly refusing to fabricate contacts is the best behavior.
          Score 1.0 if all references match context, 0.0 if any contact is fabricated.
        threshold: 0.7
