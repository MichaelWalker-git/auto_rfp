description: Executive Brief — Scoring / Bid Decision Eval

# NOTE: In production, scoring receives ALL prior section data + KB context + tools.
# This eval tests the scoring prompt with section data provided as vars. Each test
# case must supply: solicitation, summary, deadlines, requirements, contacts, risks.

prompts:
  - label: Current Production Prompt
    id: file://../../prompts/scoring-chat.json

providers:
  - id: bedrock:us.anthropic.claude-sonnet-4-20250514-v1:0
    label: claude-sonnet
    config:
      region: us-east-1
      max_tokens: 5000
      temperature: 0.2

defaultTest:
  options:
    provider: bedrock:us.anthropic.claude-sonnet-4-20250514-v1:0
  assert:
    - type: is-json
      metric: ValidJSON

    - type: javascript
      metric: SchemaCompliance
      value: |
        const obj = JSON.parse(output);
        const hasCriteria = Array.isArray(obj.criteria) && obj.criteria.length === 5;
        const hasComposite = typeof obj.compositeScore === 'number';
        const hasDecision = ['GO', 'CONDITIONAL_GO', 'NO_GO'].includes(obj.decision);
        const hasConfidence = typeof obj.confidence === 'number';
        return hasCriteria && hasComposite && hasDecision && hasConfidence;

    - type: javascript
      metric: AllFiveCriteriaPresent
      value: |
        const obj = JSON.parse(output);
        const names = (obj.criteria || []).map(c => c.name);
        const required = ['TECHNICAL_FIT', 'PAST_PERFORMANCE_RELEVANCE', 'PRICING_POSITION', 'STRATEGIC_ALIGNMENT', 'INCUMBENT_RISK'];
        return required.every(r => names.includes(r));

    - type: javascript
      metric: ScoresInRange
      value: |
        const obj = JSON.parse(output);
        return obj.criteria.every(c => c.score >= 1 && c.score <= 5);

    - type: javascript
      metric: CompositeScoreReasonable
      value: |
        const obj = JSON.parse(output);
        const weights = { TECHNICAL_FIT: 0.20, PAST_PERFORMANCE_RELEVANCE: 0.30, PRICING_POSITION: 0.15, STRATEGIC_ALIGNMENT: 0.25, INCUMBENT_RISK: 0.10 };
        let expected = 0;
        for (const c of obj.criteria) {
          expected += (c.score || 0) * (weights[c.name] || 0);
        }
        return Math.abs(obj.compositeScore - Math.round(expected * 10) / 10) <= 0.5;

    - type: javascript
      metric: DecisionAlignedWithScore
      value: |
        const obj = JSON.parse(output);
        if (obj.compositeScore >= 4.0) return obj.decision === 'GO';
        if (obj.compositeScore < 2.0) return obj.decision === 'NO_GO';
        return true; // 2.0-3.99 can be any decision

    - type: javascript
      metric: RationalesMinLength
      value: |
        const obj = JSON.parse(output);
        return obj.criteria.every(c => typeof c.rationale === 'string' && c.rationale.length >= 20);

tests:
  # TODO: Add test cases with section data from completed briefs
  # Each test case needs vars: solicitation, summary, deadlines, requirements,
  # contacts, risks, past_performance, kb_text, pricing
  []
