  # ─── Test Case 3: FUSRAP Data Management Services (PWS) ───
  - description: "USACE — FUSRAP Data Management Services (PWS — minimal contacts)"
    vars:
      solicitation: file://../../rfp-texts/fusrap-data-management-services.txt
    assert:
      # PWS has no named contacts — all roles are TBD/generic
      - type: javascript
        metric: ContactsMinimalOrEmpty
        value: |
          const obj = JSON.parse(output);
          return obj.contacts.length <= 5;

      - type: javascript
        metric: NoFabricatedNames
        value: |
          const obj = JSON.parse(output);
          return obj.contacts.every(c => !c.name || c.name === '' || c.name.toUpperCase() === 'TBD');

      - type: javascript
        metric: NoFabricatedEmails
        value: |
          const obj = JSON.parse(output);
          return obj.contacts.every(c => !c.email || c.email === '');

      - type: javascript
        metric: HasManyMissingRoles
        value: |
          const obj = JSON.parse(output);
          return obj.missingRecommendedRoles.length >= 5;

      # LLM-graded rubrics
      - type: llm-rubric
        metric: FieldExtractionAccuracy
        threshold: 0.6
        weight: 5
        value: |
          You are evaluating an AI's extraction of contacts from a government PWS (Performance Work Statement).

          GOLD STANDARD for FUSRAP Data Management Services PWS:
          - This is a PWS with NO named contacts. All roles (CO, COR, Technical Manager) are referenced generically without names, emails, or phone numbers.
          - The COR's contact info is explicitly deferred to individual task order awards.
          - The mailing address references "Philadelphia District Corps of Engineers, ATTN: TBD"
          - contacts array should be empty or contain only unnamed role references
          - missingRecommendedRoles should list most/all recommended roles

          Score 5 = correctly identifies no named contacts, extensive missing roles.
          Score 3 = includes some unnamed role entries with organization info.
          Score 1 = fabricates named contacts or contact details.

      - type: llm-rubric
        metric: HallucinationDetection
        threshold: 0.8
        weight: 5
        value: |
          Check for fabricated contact information in the FUSRAP PWS extraction.

          THIS IS A PWS WITH NO NAMED CONTACTS. Any specific name, email address, or phone number
          for a contracting officer, COR, or program manager would be a hallucination.

          The only phone number in the document is 1-800-272-1000 (New Jersey One Call for utility
          clearances) — this is NOT an RFP contact.

          WHAT COUNTS AS A HALLUCINATION:
          - Any named individual (no names appear in this PWS)
          - Any email address (none in this PWS)
          - Any phone number attributed to an RFP contact
          - Specific contact details for the CO, COR, or Technical Manager

          WHAT IS NOT A HALLUCINATION:
          - Generic role entries without names (e.g., "COR — TBD, assigned per task order")
          - Organization references (USACE Philadelphia District)
          - The mailing address (1650 Arch St, Philadelphia PA 19103)

          Score 5 = no fabricated contact details. Score 3 = one questionable entry. Score 1 = fabricated names/emails.

      - type: llm-rubric
        metric: OmissionDiscipline
        threshold: 0.8
        weight: 5
        value: |
          For the FUSRAP PWS, the key test is that the model:
          - Does NOT fabricate contact names, emails, or phone numbers
          - Reports most recommended roles as missing in missingRecommendedRoles
          - Correctly handles the absence of named contacts (empty or TBD-only contacts array)

          Score 5 = correctly empty contacts, comprehensive missing roles list.
          Score 3 = some unnecessary entries but no fabricated data.
          Score 1 = fabricated contact details or missing the missingRecommendedRoles.

