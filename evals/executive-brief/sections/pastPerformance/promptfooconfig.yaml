description: "Executive Brief — Past Performance Faithfulness & Answer Relevancy Eval"

# NOTE: In production, past performance matching is programmatic (Pinecone embeddings +
# DynamoDB lookups + gap analysis). This eval runs the same pipeline and checks that
# the output is faithful to source data (solicitation + org past projects) and relevant
# for bid/no-bid decisions.

prompts:
  - "{{ query }}"

providers:
  - id: file://generate.mjs
    label: "past_performance_matching"

defaultTest:
  options:
    provider:
      text: "bedrock:us.anthropic.claude-sonnet-4-20250514-v1:0"
      embedding: "bedrock:embedding:amazon.titan-embed-text-v2:0"
  # Provider returns "pastPerfJSON\n---CONTEXT_SEPARATOR---\ncontext"
  # transform extracts the JSON output; contextTransform extracts the source context
  transform: "output.includes('---CONTEXT_SEPARATOR---') ? output.split('---CONTEXT_SEPARATOR---')[0].trim() : output"
  assert:
    # ── Valid JSON ──
    - type: javascript
      metric: ValidJSON
      value: |
        const json = output.includes('---CONTEXT_SEPARATOR---') ? output.split('---CONTEXT_SEPARATOR---')[0].trim() : output;
        try { JSON.parse(json); return true; } catch { return false; }

    # ── Schema compliance ──
    - type: javascript
      metric: SchemaCompliance
      value: |
        const json = output.includes('---CONTEXT_SEPARATOR---') ? output.split('---CONTEXT_SEPARATOR---')[0].trim() : output;
        const obj = JSON.parse(json);
        const hasTopMatches = Array.isArray(obj.topMatches);
        const hasGapAnalysis = obj.gapAnalysis && typeof obj.gapAnalysis === 'object';
        const hasNarrative = typeof obj.narrativeSummary === 'string';
        const hasConfidence = typeof obj.confidenceScore === 'number'
          && obj.confidenceScore >= 0 && obj.confidenceScore <= 100;
        const hasEvidence = Array.isArray(obj.evidence);
        return hasTopMatches && hasGapAnalysis && hasNarrative && hasConfidence && hasEvidence;

    # ── Match details valid ──
    - type: javascript
      metric: MatchDetailsValid
      value: |
        const json = output.includes('---CONTEXT_SEPARATOR---') ? output.split('---CONTEXT_SEPARATOR---')[0].trim() : output;
        const obj = JSON.parse(json);
        return obj.topMatches.every(m => {
          const d = m.matchDetails;
          return d
            && typeof d.technicalSimilarity === 'number' && d.technicalSimilarity >= 0 && d.technicalSimilarity <= 100
            && typeof d.domainSimilarity === 'number' && d.domainSimilarity >= 0 && d.domainSimilarity <= 100
            && typeof d.scaleSimilarity === 'number' && d.scaleSimilarity >= 0 && d.scaleSimilarity <= 100
            && typeof d.recency === 'number' && d.recency >= 0 && d.recency <= 100
            && typeof d.successMetrics === 'number' && d.successMetrics >= 0 && d.successMetrics <= 100;
        });

    # ── Gap analysis structure ──
    - type: javascript
      metric: GapAnalysisValid
      value: |
        const json = output.includes('---CONTEXT_SEPARATOR---') ? output.split('---CONTEXT_SEPARATOR---')[0].trim() : output;
        const obj = JSON.parse(json);
        const ga = obj.gapAnalysis;
        if (!ga) return false;
        return Array.isArray(ga.coverageItems)
          && typeof ga.overallCoverage === 'number'
          && ga.overallCoverage >= 0 && ga.overallCoverage <= 100
          && Array.isArray(ga.criticalGaps)
          && Array.isArray(ga.recommendations);

    # ── Answer relevancy (global) ──
    - type: llm-rubric
      metric: AnswerRelevancy
      threshold: 0.7
      value: |
        Score whether this past performance analysis is RELEVANT and USEFUL for
        a government contracting bid/no-bid decision:
        - 1.0: Analysis provides actionable insight — identifies matched projects,
          coverage gaps, confidence level, and recommendations. A capture manager
          could use this to decide next steps.
        - 0.5: Analysis is partially useful but missing key elements (e.g., no gap
          analysis, no recommendations, or confidence score doesn't reflect reality)
        - 0.0: Analysis is empty, has no matches AND no gap analysis, or provides
          no decision value

outputPath: ./results/latest.json

tests:
  # ═══════════════════════════════════════════════════════════════════════════
  # Test Case 1
  # ═══════════════════════════════════════════════════════════════════════════
  - description: "Brief 1 — past performance matching with requirements context"
    vars:
      query: "012994da-38ca-46f7-8412-d404d3afcddb#80f93cb2-7ecb-49d0-9627-04f31d6d0c6c"
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.85

      - type: llm-rubric
        metric: ProjectDataFaithfulness
        threshold: 0.9
        value: |
          All project names, client names, descriptions, and technology lists in the
          past performance output must come from the PAST PROJECTS FROM DATABASE section
          of the context. The narrative summary must accurately reflect the match data.

          WHAT COUNTS AS A HALLUCINATION:
          - Project names not found in the database context
          - Client names not matching the database entries
          - Technologies or capabilities not listed in the project data
          - Fabricated relevance scores or match percentages
          - Coverage percentages that don't match the gap analysis data

          WHAT IS NOT A HALLUCINATION:
          - Descriptions derived from actual project data in the context
          - Relevance scores calculated from match details
          - Gap analysis based on comparing requirements to matched projects
          - Recommendations based on identified gaps

          Score 1.0 if all project data is grounded. Score 0.0 if any project is fabricated.

      - type: llm-rubric
        metric: RelevancyForBidDecision
        threshold: 0.7
        value: |
          Assess whether the past performance analysis provides useful bid/no-bid
          intelligence for the solicitation described in the context:
          - Does it identify relevant past projects from the database?
          - Does the gap analysis highlight missing capabilities?
          - Is the confidence score calibrated to the match quality?
          - Are recommendations actionable (teaming, adding projects, etc.)?

          Score 1.0 if analysis directly supports bid/no-bid decision.
          Score 0.5 if analysis exists but insights are generic.
          Score 0.0 if analysis provides no decision value.

  # ═══════════════════════════════════════════════════════════════════════════
  # Test Case 2
  # ═══════════════════════════════════════════════════════════════════════════
  - description: "Brief 2 — past performance matching with different RFP scope"
    vars:
      query: "175fe415-3e65-4f8e-8fe6-048b3f3bcb46#27655555-cf63-44f4-8597-13020a06cb93"
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.85

      - type: llm-rubric
        metric: ProjectDataFaithfulness
        threshold: 0.9
        value: |
          All project names, client names, and descriptions in the past performance
          output must come from the PAST PROJECTS FROM DATABASE section of the context.

          WHAT COUNTS AS A HALLUCINATION:
          - Project names not in the database context
          - Client names not matching database entries
          - Capabilities or experience not present in actual project data
          - Made-up relevance scores

          WHAT IS NOT A HALLUCINATION:
          - Accurate descriptions from the actual project data
          - Gap analysis showing mismatches between past projects and RFP requirements
          - Low confidence reflecting poor match quality

          Score 1.0 if all data grounded. Score 0.0 if any project fabricated.

      - type: llm-rubric
        metric: RelevancyForBidDecision
        threshold: 0.7
        value: |
          Assess whether the past performance analysis provides useful bid/no-bid
          intelligence for this solicitation:
          - Does the gap analysis correctly identify capability mismatches?
          - Is the confidence score calibrated to actual match quality?
          - Are recommendations actionable?

          Score 1.0 if analysis correctly identifies strengths and gaps.
          Score 0.5 if analysis exists but doesn't highlight key issues.
          Score 0.0 if analysis provides no decision value.

  # ═══════════════════════════════════════════════════════════════════════════
  # Test Case 3
  # ═══════════════════════════════════════════════════════════════════════════
  - description: "Brief 3 — past performance matching with varied requirements"
    vars:
      query: "1c828330-6ab4-417d-bd81-c4c858e0cc12#fbeca8f2-7667-4de0-b868-2a51268dd4d4"
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.85

      - type: llm-rubric
        metric: ProjectDataFaithfulness
        threshold: 0.9
        value: |
          All project names, client names, and descriptions in the past performance
          output must come from the PAST PROJECTS FROM DATABASE section of the context.

          WHAT COUNTS AS A HALLUCINATION:
          - Project names not in the database context
          - Client names not matching database entries
          - Capabilities not present in actual project data
          - Fabricated certifications or credentials

          WHAT IS NOT A HALLUCINATION:
          - Accurate project descriptions from the database
          - Gap analysis showing capability gaps relative to requirements
          - Recommendations for teaming partners

          Score 1.0 if all data grounded. Score 0.0 if any project fabricated.

      - type: llm-rubric
        metric: RelevancyForBidDecision
        threshold: 0.7
        value: |
          Assess whether the past performance analysis provides useful intelligence
          for this solicitation:
          - Does it identify relevant projects from the database (if any)?
          - Does the gap analysis flag specific capability gaps?
          - Are recommendations forward-looking (teaming, capability building)?

          Score 1.0 if analysis supports positioning and bid decision.
          Score 0.5 if analysis exists but insights are generic.
          Score 0.0 if analysis provides no decision value.

  # ═══════════════════════════════════════════════════════════════════════════
  # Test Case 4
  # ═══════════════════════════════════════════════════════════════════════════
  - description: "Brief 4 — past performance matching across capabilities"
    vars:
      query: "3479ca3e-9d6c-4592-bb96-4ef1e2224543#45304446-13fa-4ded-816b-f01ee19efc0b"
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.85

      - type: llm-rubric
        metric: ProjectDataFaithfulness
        threshold: 0.9
        value: |
          All project names, client names, and descriptions in the past performance
          output must come from the PAST PROJECTS FROM DATABASE section of the context.

          WHAT COUNTS AS A HALLUCINATION:
          - Project names not in the database context
          - Capabilities not listed in actual project data
          - Fabricated domain expertise or certifications

          WHAT IS NOT A HALLUCINATION:
          - Accurate project descriptions from the database
          - Gap analysis identifying capability gaps relative to requirements
          - Recommendations for teaming or capability augmentation

          Score 1.0 if all data grounded. Score 0.0 if any project fabricated.

      - type: llm-rubric
        metric: RelevancyForBidDecision
        threshold: 0.7
        value: |
          Assess whether the past performance analysis provides useful bid/no-bid
          intelligence for this solicitation:
          - Are relevant projects highlighted?
          - Are capability gaps correctly identified?
          - Is the confidence score calibrated to actual match quality?

          Score 1.0 if analysis is directly useful for the bid team.
          Score 0.5 if partially useful.
          Score 0.0 if no decision value.

  # ═══════════════════════════════════════════════════════════════════════════
  # Test Case 5
  # ═══════════════════════════════════════════════════════════════════════════
  - description: "Brief 5 — past performance matching with broad scope"
    vars:
      query: "38e94a22-3181-44bf-a5c3-e7184083789a#90699bec-4077-4284-8e9b-a0a707149a9a"
    assert:
      - type: context-faithfulness
        contextTransform: "output.split('---CONTEXT_SEPARATOR---')[1] ? output.split('---CONTEXT_SEPARATOR---')[1].trim() : output"
        threshold: 0.85

      - type: llm-rubric
        metric: ProjectDataFaithfulness
        threshold: 0.9
        value: |
          All project names, client names, and descriptions must come from the
          PAST PROJECTS FROM DATABASE section of the context. No fabricated
          experience or capabilities.

          Score 1.0 if all data grounded. Score 0.0 if any project fabricated.

      - type: llm-rubric
        metric: RelevancyForBidDecision
        threshold: 0.7
        value: |
          Assess whether the past performance analysis provides useful bid/no-bid
          intelligence for this solicitation — identifying relevant experience or
          correctly flagging gaps in required capability areas.

          Score 1.0 if useful for bid decision. Score 0.5 if partially useful.
          Score 0.0 if no decision value.
