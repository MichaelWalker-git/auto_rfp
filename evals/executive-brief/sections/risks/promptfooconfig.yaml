      - type: javascript
        metric: NoAcmeSolutionsHallucination
        value: |
          const obj = JSON.parse(output);
          const allText = JSON.stringify(obj).toLowerCase();
          return !allText.includes('acme');

      - type: llm-rubric
        metric: FieldExtractionAccuracy
        threshold: 0.6
        weight: 5
        value: |
          GOLD STANDARD for COSac-IT-RFP-2026-112:
          - Key risks: Salesforce integration, multilingual (EN/ES/VI), local SB 15-point preference disadvantage for non-Sacramento firms, AI/ML complexity, 18-month timeline
          - incumbentInfo: knownIncumbent=false (NO incumbent mentioned)
          - "Acme Solutions" is FABRICATED — must NOT appear

          Score 5 = captures Salesforce + local preference + AI risks. Score 1 = mostly wrong.

      - type: llm-rubric
        metric: HallucinationDetection
        threshold: 0.8
        weight: 5
        value: |
          GOLD STANDARD for COSac-IT-RFP-2026-112:
          - NO incumbent mentioned anywhere in the solicitation
          - "Acme Solutions" is COMPLETELY FABRICATED

          WHAT COUNTS AS A HALLUCINATION:
          - "Acme Solutions" as incumbent or competitor
          - Any fabricated company names
          - knownIncumbent=true (no incumbent exists)

          Score 5 = no fabricated incumbent. Score 1 = "Acme Solutions" appears.

      - type: llm-rubric
        metric: OmissionDiscipline
        threshold: 0.6
        weight: 5
        value: |
          For COSac-IT-RFP-2026-112:
          - Salesforce integration risk MUST be flagged
          - Local SB preference disadvantage MUST be flagged
          - incumbentInfo must show knownIncumbent=false

          Score 5 = all key risks captured. Score 1 = major risks omitted.

