          - PRIMCORP and KWAAN are NOT related to this solicitation

          WHAT COUNTS AS A HALLUCINATION:
          - Naming Rubrik as the incumbent contractor
          - Fabricated incumbent names
          - knownIncumbent=true

          Score 5 = Rubrik correctly identified as product. Score 1 = Rubrik as incumbent.

      - type: llm-rubric
