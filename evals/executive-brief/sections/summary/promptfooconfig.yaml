description: Executive Brief — Summary Extraction Eval

prompts:
  - label: Current Production Prompt
    id: file://../../prompts/summary-chat.json

providers:
  - id: bedrock:us.anthropic.claude-sonnet-4-20250514-v1:0
    label: claude-sonnet
    config:
      region: us-east-1
      max_tokens: 2000
      temperature: 0.2

defaultTest:
  options:
    provider: bedrock:us.anthropic.claude-sonnet-4-20250514-v1:0
  assert:
    # Shared assertions — applied to every test case
    - type: is-json
      metric: ValidJSON

    - type: javascript
      metric: SchemaCompliance
      value: |
        const obj = JSON.parse(output);
        const requiredKeys = ['summary'];
        const allowedKeys = [
          'title', 'agency', 'office', 'solicitationNumber', 'naics',
          'contractType', 'setAside', 'placeOfPerformance',
          'estimatedValueUsd', 'periodOfPerformance', 'summary'
        ];
        const hasRequired = requiredKeys.every(k => obj[k] && obj[k].length > 0);
        const extraKeys = Object.keys(obj).filter(k => !allowedKeys.includes(k));
        return hasRequired && extraKeys.length === 0;

tests:
  # ─── Test Case 1: DC Courts Legal Case Management ───
  - description: "DC Courts — Legal Case & Document Management System (DCSC-26-RFP-60)"
    vars:
      solicitation: file://../../rfp-texts/legal-case-document-management-system.txt
    assert:
      # Exact field checks
      - type: javascript
        metric: TitleMatch
        value: |
          const obj = JSON.parse(output);
          const title = (obj.title || '').toLowerCase();
          return title.includes('legal case') && title.includes('document management');

      - type: javascript
        metric: AgencyMatch
        value: |
          const obj = JSON.parse(output);
          const agency = (obj.agency || '').toLowerCase();
          return agency.includes('district of columbia courts') || agency.includes('dc courts');

      - type: javascript
        metric: SolicitationNumberMatch
        value: |
          const obj = JSON.parse(output);
          return obj.solicitationNumber === 'DCSC-26-RFP-60';

      - type: javascript
        metric: ContractTypeMatch
        value: |
          const obj = JSON.parse(output);
          const ct = (obj.contractType || '').toUpperCase();
          return ct.includes('FIXED') || ct.includes('FFP');

      - type: javascript
        metric: SetAsideMatch
        value: |
          const obj = JSON.parse(output);
          if (obj.setAside === undefined || obj.setAside === null) return true;
          const sa = obj.setAside.toUpperCase();
          return sa === 'NONE' || sa.includes('OPEN') || sa.includes('UNRESTRICTED');

      - type: javascript
        metric: NAICSMatch
        value: |
          const obj = JSON.parse(output);
          return (obj.naics || '').includes('541690');

      - type: javascript
        metric: EstimatedValueCorrectlyOmitted
        value: |
          const obj = JSON.parse(output);
          const v = obj.estimatedValueUsd; return v === undefined || v === null || v === '' || v === 'None' || (typeof v === 'string' && v.toLowerCase().includes('not specified'));

      - type: javascript
        metric: PeriodOfPerformanceMatch
        value: |
          const obj = JSON.parse(output);
          const pop = (obj.periodOfPerformance || '').toLowerCase();
          return pop.includes('base year') || (pop.includes('12') && pop.includes('option'));

      - type: javascript
        metric: PlaceOfPerformanceMatch
        value: |
          const obj = JSON.parse(output);
          const pop = (obj.placeOfPerformance || '').toLowerCase();
          return pop.includes('washington') || pop.includes('d.c') || pop.includes('dc');

      # LLM-graded rubrics
      - type: llm-rubric
        metric: FieldExtractionAccuracy
        threshold: 0.4
        weight: 5
        value: |
          You are evaluating an AI's extraction of structured fields from a government RFP.

          GOLD STANDARD (expected correct output):
          - title: "Legal Case and Document Management System"
          - agency: "District of Columbia Courts"
          - office: "Administrative Services Division, Procurement and Contracts Branch" or "Office of the General Counsel" (both appear in the document — either is acceptable)
          - solicitationNumber: "DCSC-26-RFP-60"
          - naics: "541690" (present in the solicitation)
          - contractType: "FIXED_PRICE" (firm-fixed price)
          - setAside: "NONE" (open market/unrestricted)
          - placeOfPerformance: "Washington, D.C."
          - estimatedValueUsd: should be OMITTED (not stated)
          - periodOfPerformance: "Base year + 4 option years"
          - summary: Should mention COTS legal case/document management system for OGC

          Compare the AI output against this gold standard.
          Score 5 = matches gold on all fields, 4 = 1-2 minor differences,
          3 = some incorrect/missing fields, 2 = multiple errors, 1 = mostly wrong.

      - type: llm-rubric
        metric: HallucinationDetection
        threshold: 0.8
        weight: 5
        value: |
          You are checking whether the AI output contains hallucinated information.

          GOLD STANDARD (expected values from this solicitation):
          - title: "Legal Case and Document Management System"
          - agency: "District of Columbia Courts"
          - office: "Administrative Services Division, Procurement and Contracts Branch" or "Office of the General Counsel" (both appear in the document)
          - solicitationNumber: "DCSC-26-RFP-60"
          - naics: "541690" (present in solicitation)
          - contractType: "FIXED_PRICE" (firm-fixed price)
          - setAside: "NONE" (open market/unrestricted)
          - placeOfPerformance: "Washington, D.C."
          - estimatedValueUsd: MUST BE OMITTED (not stated)
          - periodOfPerformance: "Base year + 4 option years"

          WHAT COUNTS AS A HALLUCINATION:
          - A value that is completely fabricated and does NOT appear anywhere in the source solicitation.
          - Filling in estimatedValueUsd (no dollar value stated).

          WHAT IS NOT A HALLUCINATION:
          - Values that match the gold standard or are reasonable paraphrases.
          - NAICS 541690 (appears in the solicitation).
          - Additional true details from the source document.
          - Minor wording differences that preserve meaning.

          Score 5 = all values grounded in source. Score 3 = one questionable value. Score 1 = clearly fabricated values.

      - type: llm-rubric
        metric: OmissionDiscipline
        threshold: 0.8
        weight: 5
        value: |
          For this specific solicitation (DCSC-26-RFP-60):
          - naics: "541690" SHOULD be present (it is in the solicitation)
          - estimatedValueUsd: should be OMITTED (no dollar value stated)

          Check whether the AI correctly handled these fields.

          Score 5 = correct inclusions and omissions
          Score 3 = some fields incorrectly handled
          Score 1 = hallucinated values for fields that should be omitted

