          - title: "COMET" — NOT "Software Development Services for Healthcare Portal"
          - agency: Defense Intelligence Agency
          - estimatedValueUsd: MUST BE OMITTED
          - naics: MUST BE OMITTED

          WHAT COUNTS AS A HALLUCINATION:
          - Title containing "healthcare", "software development services", or "portal"
          - Any fabricated dollar value or NAICS code
          - Wrong agency name

          Score 5 = all grounded. Score 1 = fabricated title or agency.

      - type: llm-rubric
        metric: OmissionDiscipline
        threshold: 0.8
        weight: 5
        value: |
          For HHM40225R0025:
          - estimatedValueUsd: MUST BE OMITTED
