          const obj = JSON.parse(output);
          const agency = (obj.agency || '').toLowerCase();
          return agency.includes('department of transportation') || agency.includes('dot');

      - type: javascript
        metric: SolicitationNumberMatch
        value: |
          const obj = JSON.parse(output);
          return obj.solicitationNumber === '693JK426R600002';

      - type: javascript
