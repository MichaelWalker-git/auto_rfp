          - title: MUST contain "COMET" (program name — NOT "Healthcare Portal" or "Software Dev")
          - agency: "Defense Intelligence Agency" or "DIA" or "Department of Defense" (DIA is under DoD — either is acceptable)
          - office: "Virginia Contracting Activity" or "Missile & Space Intelligence Center" or similar (multiple offices appear in the document — any is acceptable)
          - solicitationNumber: "HHM40225R0025"
          - contractType: "INDEFINITE_DELIVERY" or "IDIQ" (either acceptable)
          - estimatedValueUsd: SHOULD BE OMITTED (price not eval factor) — but including "N/A" or similar is a minor issue, not a major error
