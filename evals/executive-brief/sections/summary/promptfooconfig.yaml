          For this specific solicitation (693JK426R600002), the following fields should be OMITTED:
          - estimatedValueUsd (no dollar value stated)

          The following fields SHOULD be present:
          - naics: 541511 (explicitly stated)
          - contractType: FIXED_PRICE (explicitly stated as FFP)
          - setAside: NONE (Full and Open Competition)

          Check that present fields are extracted and absent fields are omitted.

          Score 5 = correct omissions and all present fields extracted
          Score 3 = some fields incorrectly included/omitted
          Score 1 = hallucinated values or major omissions

  # ─── Test Case 3: FUSRAP Data Management Services ───
  - description: "USACE — FUSRAP Data Management Services"
    vars:
      solicitation: file://../../rfp-texts/fusrap-data-management.txt
    assert:
      - type: javascript
        metric: TitleMatch
        value: |
          const obj = JSON.parse(output);
          const title = (obj.title || '').toLowerCase();
          return title.includes('fusrap') || (title.includes('data management') && title.includes('service'));

      - type: javascript
        metric: AgencyMatch
        value: |
          const obj = JSON.parse(output);
          const agency = (obj.agency || '').toLowerCase();
          return agency.includes('army corps') || agency.includes('usace');

      - type: javascript
        metric: NAICSMatch
        value: |
          const obj = JSON.parse(output);
          return (obj.naics || '').includes('518210');

      - type: javascript
        metric: ContractTypeMatch
        value: |
          const obj = JSON.parse(output);
          const ct = (obj.contractType || '').toUpperCase();
          return ct.includes('INDEFINITE') || ct.includes('IDIQ') || ct.includes('TASK_ORDER');

      - type: javascript
        metric: SolicitationNumberCorrectlyOmitted
        value: |
          const obj = JSON.parse(output);
          return obj.solicitationNumber === undefined || obj.solicitationNumber === null || obj.solicitationNumber === '';

      - type: javascript
        metric: EstimatedValueCorrectlyOmitted
        value: |
          const obj = JSON.parse(output);
          return obj.estimatedValueUsd === undefined || obj.estimatedValueUsd === null || obj.estimatedValueUsd === '';

      - type: javascript
        metric: PeriodOfPerformanceMatch
        value: |
          const obj = JSON.parse(output);
          const pop = (obj.periodOfPerformance || '').toLowerCase();
          return pop.includes('5') || pop.includes('five');

      - type: javascript
        metric: PlaceOfPerformanceMatch
        value: |
          const obj = JSON.parse(output);
          const pop = (obj.placeOfPerformance || '').toLowerCase();
          return pop.includes('new jersey') || pop.includes('salem') || pop.includes('nj');

      - type: llm-rubric
        metric: FieldExtractionAccuracy
        threshold: 0.6
        weight: 5
        value: |
          You are evaluating an AI's extraction from a government PWS/SOW (not a full solicitation).

          GOLD STANDARD:
          - title: "FUSRAP Data Management Services"
          - agency: "U.S. Army Corps of Engineers"
          - office: "Philadelphia District"
          - solicitationNumber: should be OMITTED (this is a PWS, no solicitation number)
          - naics: "518210"
          - contractType: "INDEFINITE_DELIVERY" (IDIQ)
          - setAside: should be OMITTED (not mentioned)
          - placeOfPerformance: "Salem County, New Jersey"
          - estimatedValueUsd: should be OMITTED
          - periodOfPerformance: "5 years from date of award"
          - summary: Should mention USACE, FUSRAP, data management/hosting, environmental remediation, DuPont Chambers Works, IDIQ

          Score 5 = matches gold on all fields, 4 = 1-2 minor differences,
          3 = some incorrect/missing, 2 = multiple errors, 1 = mostly wrong.

      - type: llm-rubric
        metric: HallucinationDetection
        threshold: 0.8
        weight: 5
        value: |
          You are checking whether the AI output contains hallucinated information.
          A hallucination is any value that does NOT match or is not directly derivable
          from the gold standard facts below.

          GOLD STANDARD (expected values from this PWS):
          - title: "FUSRAP Data Management Services"
          - agency: "U.S. Army Corps of Engineers"
          - office: "Philadelphia District"
          - solicitationNumber: MUST BE OMITTED (this is a PWS, not a numbered solicitation)
          - naics: "518210"
          - contractType: "INDEFINITE_DELIVERY" (IDIQ)
          - setAside: MUST BE OMITTED (not mentioned)
          - placeOfPerformance: "Salem County, New Jersey" (the PWS also mentions small portions in Newcastle County, Delaware — including this is NOT a hallucination)
          - estimatedValueUsd: MUST BE OMITTED (not stated)
          - periodOfPerformance: "5 years from date of award"

          WHAT COUNTS AS A HALLUCINATION:
          - A value that is completely fabricated and does NOT appear anywhere in the source PWS.
          - Filling in a field marked "MUST BE OMITTED" (e.g., inventing a solicitation number or dollar amount).

          WHAT IS NOT A HALLUCINATION:
          - Values that match the gold standard or are reasonable paraphrases.
          - Additional true details from the source document (e.g., mentioning Newcastle County, DE alongside Salem County, NJ is correct — the PWS states the site extends into both).
          - Minor wording differences that preserve meaning.
          - A title that describes the same scope of work using different words (e.g., "Data Management Services for Environmental Remediation" is a valid paraphrase of "FUSRAP Data Management Services" — both describe the same PWS). Title accuracy is evaluated separately; this rubric only checks for fabricated data.
          - The summary field containing details from the PWS (e.g., DuPont Chambers Works, environmental remediation, CMMC, aerial surveying) — these are real details from the document, not hallucinations.

          Score 5 = all values grounded in source, no fabricated data.
          Score 3 = one field contains a questionable value.
          Score 1 = one or more clearly fabricated/invented values.

