          return sa === 'NONE' || sa.includes('OPEN') || sa.includes('FULL');

      - type: javascript
        metric: EstimatedValueCorrectlyOmitted
        value: |
          const obj = JSON.parse(output);
          return obj.estimatedValueUsd === undefined || obj.estimatedValueUsd === null || obj.estimatedValueUsd === '';

      - type: javascript
        metric: PeriodOfPerformanceMatch
        value: |
          const obj = JSON.parse(output);
          const pop = (obj.periodOfPerformance || '').toLowerCase();
          return pop.includes('base') && pop.includes('option');

      - type: javascript
        metric: PlaceOfPerformanceMatch
        value: |
          const obj = JSON.parse(output);
          const pop = (obj.placeOfPerformance || '').toLowerCase();
          return pop.includes('washington') || pop.includes('d.c') || pop.includes('dc');

      # LLM-graded rubrics
      - type: llm-rubric
        metric: FieldExtractionAccuracy
        threshold: 0.6
        weight: 5
        value: |
          You are evaluating an AI's extraction of structured fields from a government RFP.

          GOLD STANDARD (expected correct output):
          - title: "Airline Analysis and Scheduling Solution via a Web-based Application"
          - agency: "U.S. Department of Transportation"
          - office: "Office of Aviation Analysis"
          - solicitationNumber: "693JK426R600002"
          - naics: "541511"
          - contractType: "FIXED_PRICE" (Firm Fixed Price)
          - setAside: "NONE" (Full and Open Competition)
          - placeOfPerformance: "Washington, DC"
          - estimatedValueUsd: should be OMITTED (not stated)
          - periodOfPerformance: "Base year + 4 option years"
          - summary: Should mention airline analysis/scheduling web app for DOT/OAA, FFP, base+4 options, full and open competition

          Compare the AI output against this gold standard.
          Score 5 = matches gold on all fields, 4 = 1-2 minor differences,
          3 = some incorrect/missing fields, 2 = multiple errors, 1 = mostly wrong.

      - type: llm-rubric
        metric: HallucinationDetection
        threshold: 0.8
        weight: 5
        value: |
          You are checking whether the AI output contains hallucinated information.
          A hallucination is any value that does NOT match or is not directly derivable
          from the gold standard facts below.

          GOLD STANDARD (expected values from this solicitation):
          - title: "Airline Analysis and Scheduling Solution via a Web-based Application"
          - agency: "U.S. Department of Transportation"
          - office: "Office of Aviation Analysis"
          - solicitationNumber: "693JK426R600002"
          - naics: "541511"
          - contractType: "FIXED_PRICE" (Firm Fixed Price)
          - setAside: "NONE" (Full and Open Competition)
          - placeOfPerformance: "Washington, DC"
          - estimatedValueUsd: MUST BE OMITTED (not stated)
          - periodOfPerformance: "Base year + 4 option years"

          WHAT COUNTS AS A HALLUCINATION:
          - A value that is completely fabricated and does NOT appear anywhere in the source solicitation.
          - Filling in a field marked "MUST BE OMITTED" (e.g., inventing a dollar amount).

          WHAT IS NOT A HALLUCINATION:
          - Values that match the gold standard or are reasonable paraphrases.
          - Additional true details from the source document.
          - Minor wording differences that preserve meaning (e.g., "Office of Aviation Analysis (OAA)" vs "Office of Aviation Analysis").
          - Title or summary wording that describes the same scope using different words. Title accuracy is evaluated separately; this rubric only checks for fabricated data.

          Score 5 = all values grounded in source, no fabricated data.
          Score 3 = one field contains a questionable value.
          Score 1 = one or more clearly fabricated/invented values.

      - type: llm-rubric
