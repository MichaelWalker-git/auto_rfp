description: Ivan3 — Rerun throttled metrics round 2

prompts:
  - label: Brief Passthrough
    raw: |
      === EXECUTIVE BRIEF JSON ===
      {{brief}}

      === SOURCE SOLICITATION TEXT ===
      {{solicitation}}

providers:
  - id: echo
    label: passthrough

defaultTest:
  options:
    provider: bedrock:us.anthropic.claude-sonnet-4-20250514-v1:0

tests:
  - description: "R614 — Document Destruction NF/SG VHS (36C24826Q0460)"
    vars:
      brief: file:///tmp/ivan3-eval/brief-exports/r614-document-destruction-nf-sg-vhs.json
      solicitation: file:///Users/ivanstadnik/Desktop/auto_rfp/evals/executive-brief/rfp-texts/r614-document-destruction-nf-sg-vhs.txt
    assert:
      - type: llm-rubric
        metric: PricingQuality
        threshold: 0.6
        value: "Evaluate the PRICING section against the source solicitation. SCORING (1-10): 9-10=data-driven+assumptions stated, 7-8=good analysis, 5-6=basic summary, 3-4=fabricated amounts."
      - type: llm-rubric
        metric: Actionability
        threshold: 0.6
        value: "Does this brief answer: (1) What is being procured? (2) Deadlines? (3) What to win? (4) Decision-makers? (5) Risks? (6) Pricing? (7) Bid or not? SCORING (1-10): 9-10=all 7 answered, 5-6=5 answered, 1-2=mostly empty."

  - description: "USACE — FUSRAP Data Management Services"
    vars:
      brief: file:///tmp/ivan3-eval/brief-exports/fusrap-data-management-services.json
      solicitation: file:///Users/ivanstadnik/Desktop/auto_rfp/evals/executive-brief/rfp-texts/fusrap-data-management-services.txt
    assert:
      - type: llm-rubric
        metric: DeadlinesQuality
        threshold: 0.6
        value: "Evaluate the DEADLINES section. EXPECTED: deadlines array with ISO-8601 dates+timezone, hasSubmissionDeadline, warnings. SCORING (1-10): 9-10=all dates correct+warnings, 5-6=some missing, 3-4=wrong/fabricated."
      - type: llm-rubric
        metric: RequirementsQuality
        threshold: 0.6
        value: "Evaluate the REQUIREMENTS section. EXPECTED: requirements with categories, deliverables, evaluationFactors, submissionCompliance. SCORING (1-10): 9-10=complete+categorized, 7-8=good coverage, 5-6=basic, 3-4=fabricated."
      - type: llm-rubric
        metric: RisksQuality
        threshold: 0.6
        value: "Evaluate the RISKS section. EXPECTED: risks+redFlags with severity/mitigation, incumbentInfo. SCORING (1-10): 9-10=all traceable, 7-8=solid, 5-6=generic, 3-4=invented."
      - type: llm-rubric
        metric: OverallFaithfulness
        threshold: 0.8
        value: "Check entire brief for hallucinated content. SCORING (1-10): 9-10=every fact traceable, 5-6=1-2 questionable, 1-2=pervasive fabrication."

