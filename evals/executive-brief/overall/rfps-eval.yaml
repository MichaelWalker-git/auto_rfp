description: "Executive Brief — Enterprise Eval (10 IT/Software RFPs, 15-25 deterministic assertions per case)"

prompts:
  - label: Brief Passthrough
    raw: |
      === EXECUTIVE BRIEF JSON ===
      {{brief}}

      === SOURCE SOLICITATION TEXT ===
      {{solicitation}}

providers:
  - id: echo
    label: passthrough

defaultTest:
  options:
    provider: bedrock:us.anthropic.claude-sonnet-4-20250514-v1:0
  assert:
    # ═══════════════════════════════════════════════════════════════════
    # STRUCTURAL CHECKS (5 assertions — apply to all test cases)
    # ═══════════════════════════════════════════════════════════════════
    - type: javascript
      metric: AllSectionsPresent
      value: |
        const m=output.indexOf('=== SOURCE');const j=m>0?output.substring(output.indexOf('{'),output.lastIndexOf('}',m)+1):output;const brief=JSON.parse(j);
        const s = brief.sections || {};
        const required = ['summary', 'deadlines', 'requirements', 'contacts', 'risks', 'pastPerformance', 'scoring', 'pricing'];
        return required.every(k => s[k] !== undefined);

    - type: javascript
      metric: CompleteSectionsHaveData
      value: |
        const m=output.indexOf('=== SOURCE');const j=m>0?output.substring(output.indexOf('{'),output.lastIndexOf('}',m)+1):output;const brief=JSON.parse(j);
        const s = brief.sections || {};
        const completeSections = Object.entries(s).filter(([_, v]) => v.status === 'COMPLETE');
        return completeSections.length > 0 && completeSections.every(([_, v]) => v.data !== null && v.data !== undefined);

    - type: javascript
      metric: CompositeScoreValid
      value: |
        const m=output.indexOf('=== SOURCE');const j=m>0?output.substring(output.indexOf('{'),output.lastIndexOf('}',m)+1):output;const brief=JSON.parse(j);
        return typeof brief.compositeScore === 'number' && brief.compositeScore >= 0 && brief.compositeScore <= 5;

    - type: javascript
      metric: DecisionValid
      value: |
        const m=output.indexOf('=== SOURCE');const j=m>0?output.substring(output.indexOf('{'),output.lastIndexOf('}',m)+1):output;const brief=JSON.parse(j);
        return ['GO', 'CONDITIONAL_GO', 'NO_GO'].includes(brief.decision);

    - type: javascript
      metric: ConfidenceValid
      value: |
        const m=output.indexOf('=== SOURCE');const j=m>0?output.substring(output.indexOf('{'),output.lastIndexOf('}',m)+1):output;const brief=JSON.parse(j);
        return typeof brief.confidence === 'number' && brief.confidence >= 0 && brief.confidence <= 100;

    # ═══════════════════════════════════════════════════════════════════
    # SUMMARY SECTION STRUCTURAL (4 assertions)
    # ═══════════════════════════════════════════════════════════════════
    - type: javascript
      metric: SummaryHasTitle
      value: |
        const m=output.indexOf('=== SOURCE');const j=m>0?output.substring(output.indexOf('{'),output.lastIndexOf('}',m)+1):output;const brief=JSON.parse(j);
        const s = brief.sections?.summary?.data;
        return s && (s.title === null || (typeof s.title === 'string' && s.title.length > 5));

    - type: javascript
      metric: SummaryHasAgency
      value: |
        const m=output.indexOf('=== SOURCE');const j=m>0?output.substring(output.indexOf('{'),output.lastIndexOf('}',m)+1):output;const brief=JSON.parse(j);
        const s = brief.sections?.summary?.data;
        return s && typeof s.agency === 'string' && s.agency.length > 2;

    - type: javascript
      metric: SummaryDataExists
      value: |
        const m=output.indexOf('=== SOURCE');const j=m>0?output.substring(output.indexOf('{'),output.lastIndexOf('}',m)+1):output;const brief=JSON.parse(j);
        const s = brief.sections?.summary?.data;
        return s && typeof s.agency === 'string' && ('solicitationNumber' in s || 'contractType' in s);

    - type: javascript
      metric: SummaryHasSummaryText
      value: |
        const m=output.indexOf('=== SOURCE');const j=m>0?output.substring(output.indexOf('{'),output.lastIndexOf('}',m)+1):output;const brief=JSON.parse(j);
        const s = brief.sections?.summary?.data;
        return s && typeof s.summary === 'string' && s.summary.length > 50;

    # ═══════════════════════════════════════════════════════════════════
    # DEADLINES SECTION STRUCTURAL (3 assertions)
    # ═══════════════════════════════════════════════════════════════════
    - type: javascript
      metric: DeadlinesHasSubmissionFlag
      value: |
        const m=output.indexOf('=== SOURCE');const j=m>0?output.substring(output.indexOf('{'),output.lastIndexOf('}',m)+1):output;const brief=JSON.parse(j);
        const d = brief.sections?.deadlines?.data;
        return d && typeof d.hasSubmissionDeadline === 'boolean';

    - type: javascript
      metric: DeadlinesArrayExists
      value: |
        const m=output.indexOf('=== SOURCE');const j=m>0?output.substring(output.indexOf('{'),output.lastIndexOf('}',m)+1):output;const brief=JSON.parse(j);
        const d = brief.sections?.deadlines?.data;
        return d && Array.isArray(d.deadlines);

    - type: javascript
      metric: DeadlinesConsistency
      value: |
        const m=output.indexOf('=== SOURCE');const j=m>0?output.substring(output.indexOf('{'),output.lastIndexOf('}',m)+1):output;const brief=JSON.parse(j);
        const d = brief.sections?.deadlines?.data;
        if (!d) return false;
        if (d.hasSubmissionDeadline) {
          return d.submissionDeadlineIso != null || d.deadlines.some(dl => dl.type === 'PROPOSAL_DUE' || dl.isSubmissionDeadline);
        }
        return true;

    # ═══════════════════════════════════════════════════════════════════
    # CONTACTS SECTION STRUCTURAL (2 assertions)
    # ═══════════════════════════════════════════════════════════════════
    - type: javascript
      metric: ContactsArrayExists
      value: |
        const m=output.indexOf('=== SOURCE');const j=m>0?output.substring(output.indexOf('{'),output.lastIndexOf('}',m)+1):output;const brief=JSON.parse(j);
        const c = brief.sections?.contacts?.data;
        return c && Array.isArray(c.contacts);

    - type: javascript
      metric: ContactsNoFabricatedEmails
      value: |
        const m=output.indexOf('=== SOURCE');const j=m>0?output.substring(output.indexOf('{'),output.lastIndexOf('}',m)+1):output;const brief=JSON.parse(j);
        const contacts = brief.sections?.contacts?.data?.contacts || [];
        const fakePatterns = ['example.com', 'test.com', 'placeholder', 'noreply@'];
        return contacts.every(c => !c.email || !fakePatterns.some(p => c.email.includes(p)));

    # ═══════════════════════════════════════════════════════════════════
    # RISKS SECTION STRUCTURAL (3 assertions)
    # ═══════════════════════════════════════════════════════════════════
    - type: javascript
      metric: RisksHasIncumbentInfo
      value: |
        const m=output.indexOf('=== SOURCE');const j=m>0?output.substring(output.indexOf('{'),output.lastIndexOf('}',m)+1):output;const brief=JSON.parse(j);
        const r = brief.sections?.risks?.data;
        return r && r.incumbentInfo && typeof r.incumbentInfo.knownIncumbent === 'boolean';

    - type: javascript
      metric: RisksNoGenericIncumbentNames
      value: |
        const m=output.indexOf('=== SOURCE');const j=m>0?output.substring(output.indexOf('{'),output.lastIndexOf('}',m)+1):output;const brief=JSON.parse(j);
        const inc = brief.sections?.risks?.data?.incumbentInfo;
        if (!inc || !inc.incumbentName) return true;
        const name = inc.incumbentName.toLowerCase();
        const banned = ['abc solutions', 'abc airlines', 'abc corp', 'abc tech', 'xyz corp', 'acme inc', 'generic contractor'];
        if (name.startsWith('abc ') || name.startsWith('xyz ')) return false;
        return !banned.some(b => name.includes(b));

    - type: javascript
      metric: RisksRecompeteIsBoolean
      value: |
        const m=output.indexOf('=== SOURCE');const j=m>0?output.substring(output.indexOf('{'),output.lastIndexOf('}',m)+1):output;const brief=JSON.parse(j);
        const inc = brief.sections?.risks?.data?.incumbentInfo;
        return inc && typeof inc.recompete === 'boolean';

    # ═══════════════════════════════════════════════════════════════════
    # SCORING SECTION STRUCTURAL (3 assertions)
    # ═══════════════════════════════════════════════════════════════════
    - type: javascript
      metric: ScoringHasAllCriteria
      value: |
        const m=output.indexOf('=== SOURCE');const j=m>0?output.substring(output.indexOf('{'),output.lastIndexOf('}',m)+1):output;const brief=JSON.parse(j);
        const s = brief.sections?.scoring?.data;
        if (!s || !s.criteria) return false;
        const names = s.criteria.map(c => c.name || c.criterion);
        const required = ['TECHNICAL_FIT', 'PAST_PERFORMANCE_RELEVANCE', 'PRICING_POSITION', 'STRATEGIC_ALIGNMENT', 'INCUMBENT_RISK'];
        return required.every(r => names.some(n => n && n.includes(r)));

    - type: javascript
      metric: ScoringCriteriaHaveScores
      value: |
        const m=output.indexOf('=== SOURCE');const j=m>0?output.substring(output.indexOf('{'),output.lastIndexOf('}',m)+1):output;const brief=JSON.parse(j);
        const s = brief.sections?.scoring?.data;
        if (!s || !s.criteria) return false;
        return s.criteria.every(c => typeof c.score === 'number' && c.score >= 1 && c.score <= 5);

    - type: javascript
      metric: ScoringDecisionConsistent
      value: |
        const m=output.indexOf('=== SOURCE');const j=m>0?output.substring(output.indexOf('{'),output.lastIndexOf('}',m)+1):output;const brief=JSON.parse(j);
        const scoring = brief.sections?.scoring?.data;
        if (!scoring) return true;
        const avgScore = scoring.criteria ? scoring.criteria.reduce((sum, c) => sum + c.score, 0) / scoring.criteria.length : 0;
        if (brief.decision === 'GO' && avgScore < 2.0) return false;
        if (brief.decision === 'NO_GO' && avgScore > 4.0) return false;
        return true;

    # ═══════════════════════════════════════════════════════════════════
    # LLM RUBRICS (3 only — OverallFaithfulness, Actionability, RiskAnalysisQuality)
    # ═══════════════════════════════════════════════════════════════════
    - type: llm-rubric
      metric: OverallFaithfulness
      threshold: 0.7
      weight: 5
      value: |
        Check whether the entire executive brief is faithful to the source solicitation.
        Review ALL sections for hallucinated content:
        - Summary: title, agency, sol#, contract type traceable?
        - Deadlines: all dates present in source? No invented deadlines?
        - Requirements: actually in the solicitation?
        - Contacts: named contacts actually in document? No invented names/emails?
        - Risks: based on real solicitation language?
        - Pricing: strategy based on what solicitation specifies?

        EXCEPTION: Past performance matches (project names, descriptions) come from
        the company's internal database — these will not appear in the source document
        and should NOT be counted as hallucinations.

        SCORING RUBRIC (1-5):
        5: Every fact traceable to source document, no fabrication
        4: All core facts correct, one minor unverifiable detail
        3: Core facts correct but 1-2 unsubstantiated claims
        2: Fabricated values (dollar amounts, dates, contacts) presented as facts
        1: Pervasive hallucination of core identifying facts

    - type: llm-rubric
      metric: Actionability
      threshold: 0.6
      weight: 4
      value: |
        Does this brief provide enough information for a go/no-go bid decision?
        Must answer: (1) What is being procured? (2) When are deadlines? (3) What do we
        need to win? (4) Who are decision-makers? (5) What are risks? (6) Can we price
        competitively? (7) Do we have relevant past performance? (8) Should we bid?

        SCORING RUBRIC (1-5):
        5: All 8 questions answered with substantive detail
        4: 7-8 answered, one may be thin
        3: 5-6 answered adequately
        2: 3-4 answered, critical gaps prevent decision
        1: Mostly empty or unusable for a bid decision

    - type: llm-rubric
      metric: RiskAnalysisQuality
      threshold: 0.6
      weight: 4
      value: |
        Evaluate the quality of risk analysis across the entire brief.
        Check: incumbent info accuracy, risk flags grounded in solicitation,
        scoring criteria reflect actual evidence, decision is logically consistent.

        SCORING RUBRIC (1-5):
        5: All risks grounded in source, severity well-calibrated, decision logical
        4: Risks well-reasoned, minor severity miscalibration
        3: Most risks traceable but some ungrounded claims or incumbent confusion
        2: Significant fabricated risks or wrong incumbent identification
        1: Risk analysis disconnected from solicitation content

